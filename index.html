<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Links | Ana Martins</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <!-- Cabeçalho com identidade pessoal -->
    <header class="profile-header">
      <img
        class="profile-image"
        src="https://via.placeholder.com/160"
        alt="Foto de perfil de Ana Martins"
      />
      <h1 class="profile-name">Ana Martins</h1>
      <p class="profile-description">
        Front-end Developer focada em experiências digitais modernas, acessíveis e elegantes.
      </p>
    </header>

    <!-- Lista principal de links -->
    <nav aria-label="Links principais">
      <ul class="links-list">
        <li><a class="link-card" href="https://www.linkedin.com" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
        <li><a class="link-card" href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a></li>
        <li><a class="link-card" href="https://www.instagram.com" target="_blank" rel="noopener noreferrer">Instagram</a></li>
        <li><a class="link-card" href="mailto:contato@anamartins.dev">Portfólio / E-mail</a></li>
      </ul>
    </nav>
  </main>
</body>
</html>
